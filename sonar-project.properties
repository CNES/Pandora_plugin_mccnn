# unique project identifier (required)
sonar.projectKey=outilscommuns:correlateurchaine3D:pandora_plugin_mc_cnn

# project metadata
sonar.projectName=plugin_MC_CNN
sonar.projectVersion=1.3.6

# path to source directories (required)
sonar.sources=pandora_plugin_mc_cnn

# path to test source directories (optional)
sonar.tests=tests

# exclude files generated by coverage and nosetests
sonar.exclusions=nosetests.xml

# path to pylint analysis report (optional)
sonar.python.pylint.reportPaths=reports/py-lint.parseable.txt

# path to nosetests (TU) report (optional)
sonar.python.xunit.reportPath=reports/nose2-junit.xml

# set python version
sonar.python.version=3.10

# path to coverage report
sonar.python.coverage.reportPaths=reports/py-coverage.cobertura.xml
